[include fluidd.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_120029001351313531383332-if00

[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 400
max_z_velocity: 10
max_z_accel: 60


[tmc2209 stepper_x]
uart_pin: PC4          # פין ה-UART הייעודי לסלוט Motor 0 בלוח Octopus Pro
run_current: 0.800     # זרם עבודה סטנדרטי למנוע X ב-Chiron
stealthchop_threshold: 999999 # מאפשר עבודה שקטה בציר X
interpolate: True      # עוזר לתנועה חלקה יותר


[tmc2209 stepper_y]
uart_pin: PD11            # Dedicated UART pin for Motor 1
run_current: 0.9       # Standard for Chiron motors; adjust if it gets too hot
stealthchop_threshold: 0  # Enables quiet mode
interpolate: True
#hold_current: 0.5
# --- STEPPER MOTORS ---
[tmc2209 stepper_z]
uart_pin: PC6
run_current: 0.800
hold_current: 0.800
stealthchop_threshold: 0

[tmc2209 stepper_z1]
uart_pin: PE4
run_current: 0.800
hold_current: 0.800
stealthchop_threshold: 0# X Axis - Motor 0

[tmc2209 extruder]
#uart_pin: PC4
uart_pin: PE1
run_current: 0.800
stealthchop_threshold: 999999
interpolate: True


[stepper_x]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
#enable_pin: !PD4
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PG11
position_min: 0
position_endstop: 0
position_max: 400
homing_speed: 50

# Y Axis - Motor 1
[stepper_y]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 32
endstop_pin: ^!PG10
position_min: 0
position_endstop: 0
position_max: 400
homing_speed: 50
#homing_positive_dir: true

# Z Axis - Motor 2 (Optical)
[stepper_z]
step_pin: PF11
dir_pin: PG3             
enable_pin: !PG5
microsteps: 16
rotation_distance: 8
endstop_pin: ^PG6
position_max: 450
position_min: -5
position_endstop: 2.35
homing_speed: 5.0
#homing_retract_dist: 4.6

[stepper_z1]
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
microsteps: 16
rotation_distance: 8
endstop_pin: ^PG9
#position_endstop: 0
#homing_speed: 5.0
#homing_positive_dir: true
# --- EXTRUDER & HEATERS ---

# Extruder - Motor 4
[extruder]
#step_pin: PF9
#dir_pin: PD7
step_pin: PE2
dir_pin: PE3
enable_pin: !PD4
#enable_pin: !PF15
microsteps: 16
rotation_distance: 7.71
nozzle_diameter: 0.400
filament_diameter: 1.750
#heater_pin: PA2           # HE0 Port
heater_pin: PA3   # Physical HE1 port
sensor_type: Generic 3950
sensor_pin: PF4           # T0 Header
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 270
max_extrude_cross_section: 5.0

[heater_bed]
heater_pin: PA1           # BED Out
sensor_type: Generic 3950
sensor_pin: PF3           # TB Header
control: pid
pid_Kp: 73.0
pid_Ki: 1.15
pid_Kd: 1150
min_temp: 0
max_temp: 120

[verify_heater extruder]
max_error: 120
check_gain_time: 20
hysteresis: 5
heating_gain: 2

[verify_heater heater_bed]
max_error: 180       # נותן למיטה 3 דקות של חסד
check_gain_time: 120 # הגדלתי ל-120 שניות בגלל המיטה הענקית של הצ'יירון
hysteresis: 5
heating_gain: 1

# --- FANS & SENSORS ---
[controller_fan board_fan_1]
pin: PD12                     # פורט VF3
max_power: 1.0
fan_speed: 1.0                # מהירות מלאה (0.0 עד 1.0)
idle_timeout: 60              # כמה שניות ימשיך לעבוד אחרי שהמנועים נעצרו
stepper: stepper_x, stepper_y, stepper_z, stepper_z1  # המאוורר יידלק כשאחד מאלו יעבוד

[controller_fan board_fan_2]
pin: PD13                     # פורט VF4 (או PD14 ל-VF5 אם VF2/VF3 תפוסים)
max_power: 1.0
fan_speed: 1.0
idle_timeout: 60
stepper: stepper_x, stepper_y, stepper_z, stepper_z1
[fan]
pin: PA8                  # Part Cooling Fan

[heater_fan hotend_fan]
pin: PE5                  # Heatbreak Fan
heater: extruder
heater_temp: 50.0

[filament_switch_sensor runout_sensor]
pause_on_runout: True
switch_pin: ^PG12         # Physical Header: Stop 4

[force_move]
enable_force_move: true


[z_tilt]
z_positions:
    10, 200
    390, 200
points:
    60, 200
    340, 200
speed: 100              # שיניתי מ-10 ל-100. המדפסת תזוז מהר יותר בין הנקודות
horizontal_move_z: 10
retries: 10             # תן לו יותר ניסיונות לתקן
retry_tolerance: 0.02   # דיוק מקסימלי
# ---------------- FLUIDD REQUIRED MODULES ----------------

[virtual_sdcard]
path: ~/printer_data/gcodes

[pause_resume]

[display_status]

# ---------------- PRINT CONTROL MACROS ----------------

[gcode_macro CANCEL_PRINT]
description: Cancel the current print
rename_existing: CANCEL_PRINT_BASE
gcode:
    TURN_OFF_HEATERS
    M106 S0
    G91
    G1 Z10 F600
    G90
    G1 X0 Y0 F6000
    CLEAR_PAUSE
    CANCEL_PRINT_BASE

[gcode_macro PAUSE]
description: Pause the current print
rename_existing: PAUSE_BASE
gcode:
    PAUSE_BASE
    G91
    G1 Z10 F600
    G90
    G1 X0 Y0 F6000

[gcode_macro RESUME]
description: Resume the current print
rename_existing: RESUME_BASE


[gcode_macro M205]
description: Ignore Marlin Jerk commands for Klipper compatibility
